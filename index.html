<!DOCTYPE html>
<html>
<head>
    <title>Study Tracker</title>
    <link rel="stylesheet" href="studytracker.css">
</head>
<body>

    <h1>📚 Study Tracker</h1>

    <input
        type="text"
        id="taskInput"
        placeholder="Enter study topic"
    >

    <select id="category">
        <option>📘 DSA</option>
        <option>⚛️ React</option>
        <option>🤖 AI/ML</option>
        <option>🌐 Web Dev</option>
    </select>

    <button onclick="addTask()">
        Add
    </button>

    <div class="stats">

        <div class="card">
            <h3 id="totalTasks">0</h3>
            <p>Total Topics</p>
        </div>

        <div class="card">
            <h3 id="completedTasks">0</h3>
            <p>Completed</p>
        </div>

        <div class="card">
            <h3 id="pendingTasks">0</h3>
            <p>Pending</p>
        </div>

    </div>

    <div class="progress-container">

        <div class="progress-text">
            Progress:
            <span id="progressPercent">0%</span>
        </div>

        <div class="progress-bar">
            <div
                class="progress-fill"
                id="progressFill">
            </div>
        </div>

    </div>

    <ul id="taskList"></ul>

    <script src="studytracker.js"></script>

</body>
</html>
