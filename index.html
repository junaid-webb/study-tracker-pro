<!DOCTYPE html>
<html>
<head>
    <title>Study Tracker</title>
    <link rel="stylesheet" href="studytracker.css">
</head>
<body>

    <h1>📚 Study Tracker</h1>

    <input
        type="text"
        id="taskInput"
        placeholder="Enter study topic"
    >

    <select id="category">
        <option>📘 DSA</option>
        <option>⚛️ React</option>
        <option>🤖 AI/ML</option>
        <option>🌐 Web Dev</option>
    </select>

    <button onclick="addTask()">
        Add
    </button>

    <br><br>

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search topics..."
        onkeyup="renderTasks()"
    >

    <div class="stats">

        <div class="card">
            <h3 id="totalTasks">0</h3>
            <p>Total Topics</p>
        </div>

        <div class="card">
            <h3 id="completedTasks">0</h3>
            <p>Completed</p>
        </div>

        <div class="card">
            <h3 id="pendingTasks">0</h3>
            <p>Pending</p>
        </div>

    </div>

    <div class="goal-section">

        <input
            type="number"
            id="goalInput"
            placeholder="Set study goal"
        >

        <button onclick="saveGoal()">
            Save Goal
        </button>

        <p id="goalText">
            Goal: 0 Topics
        </p>

    </div>

    <div class="progress-container">

        <div class="progress-text">
            Progress:
            <span id="progressPercent">0%</span>
        </div>

        <div class="progress-bar">
            <div
                class="progress-fill"
                id="progressFill">
            </div>
        </div>

    </div>

    <div class="achievements">
        <h2>🏆 Achievements</h2>
        <div id="badges"></div>
    </div>

    <div class="pomodoro">

        <h2>⏱ Pomodoro Timer</h2>

        <div id="timer">
            25:00
        </div>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

    </div>

    <div class="quote" id="quote"></div>

    <ul id="taskList"></ul>

    <script src="studytracker.js"></script>

</body>
</html>
